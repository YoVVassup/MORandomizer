; =========================================================================================
; MORandomizer (Mental Omega 3.3.6 Weapon Randomizer) Configuration File
; =========================================================================================
; Note:
; Fuzzy pattern matching and exact blacklist entries are case-insensitive.
; =========================================================================================

[Settings]
; ========================================================
; 1. Basic Debug Settings
; ========================================================
; Enable feedback beeps (yes/no)
EnableBeep=yes
; Enable debug logging, generates MORandomizer_Debug.log (for troubleshooting crashes)
EnableDebugLog=yes

; ========================================================
; 2. Modifier Key Requirements
; ========================================================
; Set to yes to require the respective modifier key when pressing a hotkey
RequireCtrl=yes
RequireShift=yes
RequireAlt=no

; ========================================================
; 3. Hotkey Bindings
; ========================================================
; Global same-class shuffle (infantry→infantry, vehicles→vehicles, etc.)
KeyRandomWeapons=W
; Global cross-class chaos (mix weapons across all unit types)
KeyChaosMode=C
; Local randomization (only affects currently selected units)
KeySelectedRandom=S
; Toggle switch for S-key mode (same-class vs. cross-class)
KeyToggleChaos=E
; Restore original weapon assignments
KeyRestore=R

; ========================================================
; 4. Randomization Scope & Safety Controls
; ========================================================
; Allow infantry randomization
RandomizeInfantry=yes
; Allow vehicle (including naval) randomization
RandomizeUnits=yes
; Allow aircraft randomization (high risk: may cause flight path crashes)
RandomizeAircraft=yes
; Allow defense buildings randomization
RandomizeBuildings=yes

; ⚠️ Building inclusion in cross-class chaos (extremely dangerous!)
; Set to yes: buildings will participate in the global cross-class pool
;              (high risk of crashes due to missing turret/skeleton animations)
; Set to no (recommended): buildings are shuffled only within the building-safe pool,
;                         while other unit types still use the full chaos pool.
IncludeBuildingsInChaos=no


