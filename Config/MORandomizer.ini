Shield     ; Kills all shield generators
Generator  ; Kills all cloak / illusion generators
Field      ; Kills all force fields (e.g., ConfusionField)
Death      ; Kills all death / explosion effects
Explosion  ; Kills all area explosion logic
Fragment   ; Kills all weapon fragment / debris
