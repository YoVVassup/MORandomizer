[Blacklist]
; ========================================================
; [Nuclear‑grade fuzzy kill patterns] – any weapon containing these substrings is instantly removed from the pool
; ========================================================
Strike     ; Kills all airstrike / beacon weapons (e.g., ComancheStrike)
Spawn      ; Kills all entity spawners (e.g., HurricaneSpawn)
Drain      ; Kills all draining / parasite weapons (e.g., DiskDrain)
Warp       ; Kills all chrono warp logic
Chrono     ; Kills all chronosphere mechanisms (e.g., ChronoFreeze)
Signal     ; Kills all signal flare weapons
Scanner    ; Kills all fake target scanners
Target     ; Kills all dummy target indicators
